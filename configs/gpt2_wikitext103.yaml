name: gpt2-large-wikitext103
wandb_project: gpt2-large-wikitext103
backend: pytorch
task: language_model
dataset: wikitext103
model: gpt2-large
tokenizer: gpt2
max_seq_len: 1024
epochs: 30
batch_size: 8
gradient_accumulation_steps: 4
lr: 2e-4
optimizer: adamw
optimizer_args:
  betas: [0.9, 0.95]
weight_decay: 0.1
scheduler: cosine
warmup_epochs: 3
grad_clip: 1.0
metrics: [perplexity]
save_every: 5
generate_every: 5
generate_max_tokens: 100
generate_prompts: ["The meaning of life is", "In the beginning", "Once upon a time"]
logger: wandb
log_interval: 40


# ── DDP ──────────────────────────────────────────────────────────
ddp: true
ddp_backend: nccl               # nccl for GPU, gloo for CPU/fallback
ddp_find_unused: false
ddp_gradient_as_bucket: true

# ── Performance ──────────────────────────────────────────────────
num_workers: 8
pin_memory: true
amp: true
compile: true
compile_mode: default
compile_cache_dir: /tmp/torch_compile_cache  # persists across restarts within same job
cudnn_benchmark: true

