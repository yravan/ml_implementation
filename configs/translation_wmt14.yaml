name: translation-wmt14
task: seq2seq
dataset: wmt14
model: t5_base
tokenizer: bert-base-multilingual-cased
max_seq_len: 256
epochs: 20
batch_size: 32
lr: 1e-4
optimizer: adamw
scheduler: cosine
warmup_epochs: 3
grad_clip: 1.0
label_smoothing: 0.1
amp: true
ddp: true
ddp_backend: nccl
metrics: [bleu]
logger: tensorboard
log_interval: 200
