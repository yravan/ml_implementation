# BERT NSP-only — GPU / PyTorch / Base
name: bert_nsp_gpu
backend: pytorch
task: nsp
dataset: bert_nsp_openwebtext
model: bert_nsp
tokenizer: bert-base-uncased

max_seq_len: 512
batch_size: 64
max_steps: 50000
lr: 1e-4
optimizer: adamw
weight_decay: 0.01
scheduler: cosine
warmup_steps: 5000
grad_clip: 1.0
gradient_accumulation_steps: 2
save_every_steps: 5000
eval_max_batches: 100
log_interval: 100

amp: true
compile: true

num_workers: 8
pin_memory: true
logger: wandb
wandb_project: bert-nsp
metrics: []
