# BERT Pre-Training — FineWeb-Edu 10BT
name: bert_pretrain_fineweb
backend: pytorch
task: bert_pretrain
dataset: bert_pretrain_fineweb
model: bert_pretrain
tokenizer: bert-base-uncased

max_seq_len: 512
batch_size: 32
max_steps: 200000
lr: 1e-4
optimizer: adamw
weight_decay: 0.01
scheduler: cosine
warmup_steps: 10000
grad_clip: 1.0
gradient_accumulation_steps: 8
save_every_steps: 10000
eval_max_batches: 100
log_interval: 100

amp: true
compile: true

num_workers: 8
pin_memory: true
logger: wandb
wandb_project: bert-pretrain
metrics: []
