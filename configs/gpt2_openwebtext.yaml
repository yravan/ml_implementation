name: gpt2-large-openwebtext
wandb_project: gpt2-large-openwebtext
backend: pytorch
task: language_model
dataset: openwebtext
model: gpt2-large
tokenizer: gpt2
max_seq_len: 1024
batch_size: 8
gradient_accumulation_steps: 4
lr: 2e-4
optimizer: adamw
optimizer_args:
  betas: [0.9, 0.95]
weight_decay: 0.1
scheduler: cosine
grad_clip: 1.0
metrics: [perplexity]
max_steps: 800000
warmup_steps: 5000
save_every_steps: 50000
generate_max_tokens: 100
generate_prompts: ["The future of artificial intelligence", "Scientists have discovered", "Once upon a time"]
logger: wandb
log_interval: 100
# ── DDP ──────────────────────────────────────────────────────────
ddp: true
ddp_backend: nccl
ddp_find_unused: false
ddp_gradient_as_bucket: true

# ── Performance ──────────────────────────────────────────────────
num_workers: 16
pin_memory: true
amp: true
compile: true
compile_mode: default
compile_cache_dir: /tmp/torch_compile_cache
cudnn_benchmark: true
