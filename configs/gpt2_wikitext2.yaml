name: gpt2-wikitext2
task: language_model
dataset: wikitext2
model: gpt2
tokenizer: gpt2
max_seq_len: 256
epochs: 10
batch_size: 16
lr: 3e-4
optimizer: adamw
weight_decay: 0.01
scheduler: cosine
warmup_epochs: 1
grad_clip: 1.0
metrics: [perplexity]
generate_every: 2
generate_max_tokens: 50
generate_prompts: ["The meaning of life is", "In the beginning"]
logger: tensorboard
log_interval: 100
